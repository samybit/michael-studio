<svg viewBox="0 0 600 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="350" fill="#0A0B0E" />
  
  <!-- Blueprint Grid Pattern -->
  <defs>
    <pattern id="blueprint-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="600" height="350" fill="url(#blueprint-grid)" />

  <!-- Backdrop sun graphic behind towers -->
  <circle cx="280" cy="170" r="100" stroke="#FE7F2D" stroke-width="0.75" stroke-opacity="0.15" stroke-dasharray="4 4" />
  <circle cx="280" cy="170" r="130" stroke="#AD757E" stroke-width="0.5" stroke-opacity="0.1" />

  <!-- 1. Tower A (Far Left: low-rise structure) -->
  <rect x="60" y="190" width="60" height="110" stroke="#EAECF0" stroke-width="1.25" stroke-opacity="0.5" />
  <line x1="90" y1="190" x2="90" y2="300" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />
  <line x1="60" y1="220" x2="120" y2="220" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />
  <line x1="60" y1="250" x2="120" y2="250" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />
  <line x1="60" y1="280" x2="120" y2="280" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />

  <!-- 2. Tower B (Left-Center: Facade grid skyscraper from drawing 1) -->
  <rect x="140" y="90" width="80" height="210" stroke="#EAECF0" stroke-width="1.5" stroke-opacity="0.8" />
  <line x1="180" y1="90" x2="180" y2="300" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <!-- Horizontal floors -->
  <line x1="140" y1="120" x2="220" y2="120" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="140" y1="150" x2="220" y2="150" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="140" y1="180" x2="220" y2="180" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="140" y1="210" x2="220" y2="210" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="140" y1="240" x2="220" y2="240" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="140" y1="270" x2="220" y2="270" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />

  <!-- 3. Tower C (Center-Right: Modernist cantilever + diagonal bracing) -->
  <rect x="240" y="130" width="100" height="170" stroke="#AD757E" stroke-width="1.5" stroke-opacity="0.8" />
  <!-- Diagonal structural braces -->
  <line x1="240" y1="130" x2="340" y2="230" stroke="#AD757E" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="340" y1="130" x2="240" y2="230" stroke="#AD757E" stroke-width="0.75" stroke-opacity="0.4" />
  <!-- Cantilever upper box -->
  <rect x="220" y="130" width="80" height="50" fill="#0A0B0E" stroke="#EAECF0" stroke-width="1.25" />
  <line x1="220" y1="155" x2="300" y2="155" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />

  <!-- 4. Tower D (Right: Spire antenna tower from drawing 1) -->
  <rect x="360" y="70" width="60" height="230" stroke="#EAECF0" stroke-width="1.5" stroke-opacity="0.8" />
  <line x1="380" y1="70" x2="380" y2="300" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <line x1="400" y1="70" x2="400" y2="300" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.4" />
  <!-- Antenna spire -->
  <line x1="390" y1="70" x2="390" y2="20" stroke="#FE7F2D" stroke-width="1.5" stroke-opacity="0.8" />

  <!-- 5. Tower E (Far Right: tiered low-rise facade) -->
  <rect x="440" y="170" width="90" height="130" stroke="#EAECF0" stroke-width="1.25" stroke-opacity="0.5" />
  <rect x="460" y="140" width="50" height="30" stroke="#EAECF0" stroke-width="1" stroke-opacity="0.4" fill="#0A0B0E" />
  <!-- Grid lines -->
  <line x1="485" y1="140" x2="485" y2="300" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />
  <line x1="440" y1="210" x2="530" y2="210" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />
  <line x1="440" y1="250" x2="530" y2="250" stroke="#EAECF0" stroke-width="0.75" stroke-opacity="0.3" />

  <!-- Horizontal Landscape Base line -->
  <line x1="20" y1="300" x2="580" y2="300" stroke="#EAECF0" stroke-width="2" />

  <!-- Technical Annotations -->
  <text x="30" y="50" fill="#FE7F2D" font-family="monospace" font-size="10" letter-spacing="2" fill-opacity="0.6">CITY ELEVATION // 01</text>
  <text x="30" y="65" fill="#EAECF0" font-family="monospace" font-size="8" fill-opacity="0.4">SCALE: 1:500</text>
  <text x="520" y="280" fill="#AD757E" font-family="monospace" font-size="8" letter-spacing="1" fill-opacity="0.6">SEC_B</text>
</svg>
